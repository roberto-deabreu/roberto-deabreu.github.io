<svg xmlns="http://www.w3.org/2000/svg" width="520" height="310" viewBox="0 0 520 310" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="curveGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f3460" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0f3460" stop-opacity="0.03"/>
    </linearGradient>
    <clipPath id="plotClip">
      <rect x="70" y="25" width="415" height="250"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="520" height="310" rx="12" fill="#f8fafc"/>

  <!-- Plot area background -->
  <rect x="70" y="25" width="415" height="250" rx="4" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Horizontal grid lines -->
  <!-- y=3.0 → py=25 -->
  <line x1="70" y1="25"  x2="485" y2="25"  stroke="#e8edf3" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- y=2.5 → py=78 -->
  <line x1="70" y1="78"  x2="485" y2="78"  stroke="#e8edf3" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- y=2.0 → py=131 -->
  <line x1="70" y1="131" x2="485" y2="131" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- y=1.5 → py=184 -->
  <line x1="70" y1="184" x2="485" y2="184" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- y=1.0 → py=237 -->
  <line x1="70" y1="237" x2="485" y2="237" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- y=0.75 → py=275 -->
  <line x1="70" y1="275" x2="485" y2="275" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Vertical grid lines at ages 20,30,40,50,60,70,80 -->
  <!-- x(20)=88, x(30)=148, x(40)=209, x(50)=269, x(60)=330, x(70)=390, x(80)=450 -->
  <line x1="88"  y1="25" x2="88"  y2="275" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="148" y1="25" x2="148" y2="275" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="209" y1="25" x2="209" y2="275" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="269" y1="25" x2="269" y2="275" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="330" y1="25" x2="330" y2="275" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="390" y1="25" x2="390" y2="275" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="450" y1="25" x2="450" y2="275" stroke="#e8edf3" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Filled area under curve (clipped) -->
  <path clip-path="url(#plotClip)"
    d="M 70,25
       C 80,68 87,111 100,140
       C 113,170 130,186 148,204
       C 166,222 189,238 209,248
       C 229,258 249,264 269,265
       C 289,266 309,261 330,252
       C 350,243 370,231 390,215
       C 410,199 435,172 450,152
       C 465,132 470,118 485,98
       L 485,275 L 70,275 Z"
    fill="url(#curveGrad)"/>

  <!-- Curve line -->
  <path
    d="M 70,25
       C 80,68 87,111 100,140
       C 113,170 130,186 148,204
       C 166,222 189,238 209,248
       C 229,258 249,264 269,265
       C 289,266 309,261 330,252
       C 350,243 370,231 390,215
       C 410,199 435,172 450,152
       C 465,132 470,118 485,98"
    fill="none" stroke="#0f3460" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Minimum marker dot at age ~50, val 0.75 -->
  <circle cx="269" cy="265" r="4.5" fill="#0f3460" stroke="#fff" stroke-width="2"/>

  <!-- Axes -->
  <line x1="70" y1="275" x2="485" y2="275" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="70" y1="25"  x2="70"  y2="275" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Y axis labels -->
  <text x="62" y="29"  text-anchor="end" font-size="10" fill="#64748b">3.00</text>
  <text x="62" y="82"  text-anchor="end" font-size="10" fill="#64748b">2.50</text>
  <text x="62" y="135" text-anchor="end" font-size="10" fill="#64748b">2.00</text>
  <text x="62" y="188" text-anchor="end" font-size="10" fill="#64748b">1.50</text>
  <text x="62" y="241" text-anchor="end" font-size="10" fill="#64748b">1.00</text>
  <text x="62" y="279" text-anchor="end" font-size="10" fill="#64748b">0.75</text>

  <!-- X axis labels -->
  <text x="88"  y="291" text-anchor="middle" font-size="10" fill="#64748b">20</text>
  <text x="148" y="291" text-anchor="middle" font-size="10" fill="#64748b">30</text>
  <text x="209" y="291" text-anchor="middle" font-size="10" fill="#64748b">40</text>
  <text x="269" y="291" text-anchor="middle" font-size="10" fill="#64748b">50</text>
  <text x="330" y="291" text-anchor="middle" font-size="10" fill="#64748b">60</text>
  <text x="390" y="291" text-anchor="middle" font-size="10" fill="#64748b">70</text>
  <text x="450" y="291" text-anchor="middle" font-size="10" fill="#64748b">80</text>

  <!-- Axis titles -->
  <text x="277" y="308" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">Age</text>
  <text transform="rotate(-90,14,150)" x="14" y="150" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">Claim Frequency Relativity</text>
</svg>
